name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java: [17, 21]

    runs-on: ${{ matrix.os }}
    name: "${{ matrix.os }} / Java ${{ matrix.java }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Compile
        run: ./mvnw compile -q --no-transfer-progress
        shell: bash

      - name: Run tests
        run: ./mvnw test --no-transfer-progress
        shell: bash

      - name: Package CLI
        run: ./mvnw package -DskipTests -pl mcpm-cli -am --no-transfer-progress
        shell: bash

      - name: Package Registry Server
        run: ./mvnw package -DskipTests -pl mcpm-registry-server -am --no-transfer-progress
        shell: bash

      - name: Verify CLI JAR
        run: java -jar mcpm-cli/target/mcpm-cli-0.1.0-SNAPSHOT.jar --version
        shell: bash

      - name: Verify Server JAR
        run: java -jar mcpm-registry-server/target/mcpm-registry-server-0.1.0-SNAPSHOT.jar --help
        shell: bash

      - name: Smoke test
        run: java -jar mcpm-cli/target/mcpm-cli-0.1.0-SNAPSHOT.jar search filesystem
        shell: bash
