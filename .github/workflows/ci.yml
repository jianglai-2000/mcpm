name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java: [17, 21]

    runs-on: ${{ matrix.os }}
    name: "Build & Test — ${{ matrix.os }} / Java ${{ matrix.java }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn compile -q

      - name: Run tests
        run: mvn test

      - name: Package
        run: mvn package -DskipTests

      - name: Verify fat JAR runs
        run: java -jar mcpm-cli/target/mcpm-cli-0.1.0-SNAPSHOT.jar --version

      - name: Smoke test — search
        run: java -jar mcpm-cli/target/mcpm-cli-0.1.0-SNAPSHOT.jar search filesystem
